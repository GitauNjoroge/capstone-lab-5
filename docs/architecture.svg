<text class="t-subnet" x="48" y="350" dominant-baseline="central">Private app subnets — AZ-a + AZ-b</text>
<rect class="fill-blue" x="50" y="360" width="320" height="44" rx="6" stroke-width="0.5"/>
<text class="t-title text-blue" x="210" y="376" text-anchor="middle" dominant-baseline="central">EC2 Auto Scaling Group</text>
<text class="t-sub text-blue-sub" x="210" y="394" text-anchor="middle" dominant-baseline="central">Instances in AZ-a and AZ-b</text>

<path d="M210 404 V410 H122 V416" class="conn" marker-end="url(#arrow)"/>

<rect class="fill-teal" x="50" y="416" width="145" height="44" rx="6" stroke-width="0.5"/>
<text class="t-title text-teal" x="122" y="432" text-anchor="middle" dominant-baseline="central">SQS</text>
<text class="t-sub text-teal-sub" x="122" y="450" text-anchor="middle" dominant-baseline="central">Order queue</text>

<rect class="fill-blue" x="215" y="416" width="145" height="44" rx="6" stroke-width="0.5"/>
<text class="t-title text-blue" x="287" y="432" text-anchor="middle" dominant-baseline="central">ECS Fargate</text>
<text class="t-sub text-blue-sub" x="287" y="450" text-anchor="middle" dominant-baseline="central">Scales with queue</text>

<line x1="195" y1="438" x2="213" y2="438" class="conn" marker-end="url(#arrow)"/>

<rect class="subnet" x="40" y="482" width="340" height="76" rx="6"/>
<text class="t-subnet" x="48" y="492" dominant-baseline="central">Database subnets — AZ-a + AZ-b</text>
<rect class="fill-teal" x="50" y="502" width="145" height="44" rx="6" stroke-width="0.5"/>
<text class="t-title text-teal" x="122" y="518" text-anchor="middle" dominant-baseline="central">RDS Multi-AZ</text>
<text class="t-sub text-teal-sub" x="122" y="536" text-anchor="middle" dominant-baseline="central">MySQL, standby in AZ-b</text>
<rect class="fill-teal" x="215" y="502" width="145" height="44" rx="6" stroke-width="0.5"/>
<text class="t-title text-teal" x="287" y="518" text-anchor="middle" dominant-baseline="central">ElastiCache</text>
<text class="t-sub text-teal-sub" x="287" y="536" text-anchor="middle" dominant-baseline="central">Redis, Multi-AZ</text>

<rect class="region" x="420" y="200" width="240" height="380" rx="14"/>
<text class="t-region" x="440" y="218" dominant-baseline="central">eu-central-1</text>
<text class="t-region-sub" x="552" y="218" dominant-baseline="central">Warm standby</text>

<rect class="vpc" x="430" y="232" width="220" height="340" rx="10"/>
<text class="t-vpc" x="444" y="248" dominant-baseline="central">VPC 10.1.0.0/16</text>

<rect class="subnet" x="440" y="260" width="200" height="70" rx="6"/>
<text class="t-subnet" x="448" y="270" dominant-baseline="central">Public subnets — AZ-a + AZ-b</text>
<rect class="fill-blue" x="450" y="280" width="180" height="44" rx="6" stroke-width="0.5"/>
<text class="t-title text-blue" x="540" y="296" text-anchor="middle" dominant-baseline="central">ALB</text>
<text class="t-sub text-blue-sub" x="540" y="314" text-anchor="middle" dominant-baseline="central">Standby</text>

<line x1="540" y1="324" x2="540" y2="360" class="conn" marker-end="url(#arrow)"/>

<rect class="subnet" x="440" y="340" width="200" height="132" rx="6"/>
<text class="t-subnet" x="448" y="350" dominant-baseline="central">Private app subnets — AZ-a + AZ-b</text>
<rect class="fill-blue" x="450" y="360" width="180" height="44" rx="6" stroke-width="0.5"/>
<text class="t-title text-blue" x="540" y="376" text-anchor="middle" dominant-baseline="central">ASG (min capacity)</text>
<text class="t-sub text-blue-sub" x="540" y="394" text-anchor="middle" dominant-baseline="central">Scales up on failover</text>

<line x1="540" y1="404" x2="540" y2="502" class="conn" marker-end="url(#arrow)"/>

<rect class="subnet" x="440" y="482" width="200" height="76" rx="6"/>
<text class="t-subnet" x="448" y="492" dominant-baseline="central">Database subnets — AZ-a + AZ-b</text>
<rect class="fill-teal" x="450" y="502" width="180" height="44" rx="6" stroke-width="0.5"/>
<text class="t-title text-teal" x="540" y="518" text-anchor="middle" dominant-baseline="central">RDS</text>
<text class="t-sub text-teal-sub" x="540" y="536" text-anchor="middle" dominant-baseline="central">Cross-region replica</text>

<rect class="fill-teal" x="40" y="608" width="600" height="56" rx="8" stroke-width="0.5"/>
<text class="t-title text-teal" x="340" y="628" text-anchor="middle" dominant-baseline="central">DynamoDB Global Tables</text>
<text class="t-sub text-teal-sub" x="340" y="648" text-anchor="middle" dominant-baseline="central">Sessions and catalog, active-active replication</text>

<rect class="fill-gray" x="40" y="684" width="290" height="56" rx="8" stroke-width="0.5"/>
<text class="t-title text-gray" x="185" y="704" text-anchor="middle" dominant-baseline="central">AWS Backup</text>
<text class="t-sub text-gray-sub" x="185" y="724" text-anchor="middle" dominant-baseline="central">Cross-region snapshot copy</text>

<rect class="fill-gray" x="350" y="684" width="290" height="56" rx="8" stroke-width="0.5"/>
<text class="t-title text-gray" x="495" y="704" text-anchor="middle" dominant-baseline="central">CloudWatch</text>
<text class="t-sub text-gray-sub" x="495" y="724" text-anchor="middle" dominant-baseline="central">Metrics, logs, alarms, dashboards</text>
</svg>
