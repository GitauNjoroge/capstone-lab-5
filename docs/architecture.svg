<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 760" font-family="Arial, Helvetica, sans-serif" role="img" aria-labelledby="diagramTitle diagramDesc">
<title id="diagramTitle">Resilient e-commerce architecture across two AWS regions with VPC and subnets</title>
<desc id="diagramDesc">Architecture diagram showing the e-commerce app deployed across two AWS regions. Each region contains a VPC with three subnet tiers spanning two Availability Zones: public subnets host the Application Load Balancer, private application subnets host the EC2 Auto Scaling Group, SQS and ECS Fargate workers, and database subnets host RDS Multi-AZ MySQL and ElastiCache Redis. Route 53 with health checks performs failover routing between primary region eu-west-1 and warm-standby secondary region eu-central-1. DynamoDB Global Tables provides active-active replication for sessions and catalog data. AWS Backup performs cross-region snapshot copies. CloudWatch provides metrics, logs, and alarms.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.t-title { font-size: 14px; font-weight: 500; }
.t-sub { font-size: 12px; font-weight: 400; }
.t-region { font-size: 14px; font-weight: 500; fill: #444441; }
.t-region-sub { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
.t-vpc { font-size: 12px; font-weight: 500; fill: #444441; }
.t-subnet { font-size: 11px; font-weight: 400; fill: #5F5E5A; font-style: italic; }
.fill-blue { fill: #E6F1FB; stroke: #185FA5; }
.text-blue { fill: #042C53; }
.text-blue-sub { fill: #185FA5; }
.fill-teal { fill: #E1F5EE; stroke: #0F6E56; }
.text-teal { fill: #04342C; }
.text-teal-sub { fill: #0F6E56; }
.fill-gray { fill: #F1EFE8; stroke: #888780; }
.text-gray { fill: #2C2C2A; }
.text-gray-sub { fill: #5F5E5A; }
.conn { stroke: #5F5E5A; fill: none; stroke-width: 1.5; }
.beam { stroke: #B4B2A9; fill: none; stroke-width: 0.5; }
.region { fill: none; stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 4; }
.vpc { fill: none; stroke: #888780; stroke-width: 0.5; }
.subnet { fill: none; stroke: #B4B2A9; stroke-width: 0.4; }
</style>
</defs>
<rect width="680" height="760" fill="#FFFFFF"/>

<rect class="fill-gray" x="280" y="30" width="120" height="44" rx="8" stroke-width="0.5"/>
<text class="t-title text-gray" x="340" y="52" text-anchor="middle" dominant-baseline="central">Users</text>

<line x1="340" y1="74" x2="340" y2="98" class="conn" marker-end="url(#arrow)"/>

<rect class="fill-blue" x="220" y="100" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="t-title text-blue" x="340" y="120" text-anchor="middle" dominant-baseline="central">Route 53</text>
<text class="t-sub text-blue-sub" x="340" y="138" text-anchor="middle" dominant-baseline="central">Failover with health checks</text>

<line x1="340" y1="156" x2="340" y2="180" class="beam"/>
<line x1="210" y1="180" x2="540" y2="180" class="beam"/>
<line x1="210" y1="180" x2="210" y2="278" class="conn" marker-end="url(#arrow)"/>
<line x1="540" y1="180" x2="540" y2="278" class="conn" marker-end="url(#arrow)"/>

<rect class="region" x="20" y="200" width="380" height="380" rx="14"/>
<text class="t-region" x="40" y="218" dominant-baseline="central">eu-west-1</text>
<text class="t-region-sub" x="130" y="218" dominant-baseline="central">Primary region</text>

<rect class="vpc" x="30" y="232" width="360" height="340" rx="10"/>
<text class="t-vpc" x="44" y="248" dominant-baseline="central">VPC 10.0.0.0/16</text>

<rect class="subnet" x="40" y="260" width="340" height="70" rx="6"/>
<text class="t-subnet" x="48" y="270" dominant-baseline="central">Public subnets — AZ-a + AZ-b</text>
<rect class="fill-blue" x="50" y="280" width="320" height="44" rx="6" stroke-width="0.5"/>
<text class="t-title text-blue" x="210" y="296" text-anchor="middle" dominant-baseline="central">Application Load Balancer</text>
<text class="t-sub text-blue-sub" x="210" y="314" text-anchor="middle" dominant-baseline="central">Spans 2 AZs</text>

<line x1="210" y1="324" x2="210" y2="360" class="conn" marker-end="url(#arrow)"/>

